name = "safe-learning-spot"
main = "worker/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Serve all static files in the project root as the site's assets.
# The Worker handles /api/* requests; everything else falls through to ASSETS.
[assets]
directory = "."
binding = "ASSETS"
# Serve files EXACTLY as named (e.g. /login.html) instead of Cloudflare's
# default behaviour of 307-redirecting /login.html -> /login. That redirect was
# the root cause of the "a redirected response was used for a request whose
# redirect mode is not follow" service-worker errors: the SW pre-caches .html
# pages and a SW may not return a redirected response for a navigation request.
html_handling = "none"
# Unknown paths return a plain 404 (the app only links to real .html files).
# The bare root "/" is mapped to /index.html inside worker/index.js.
not_found_handling = "none"

# D1 database for users, progress, sync state.
# After running `wrangler d1 create safe-learning-spot`, paste the
# database_id from the output below.
[[d1_databases]]
binding = "DB"
database_name = "safe-learning-spot"
database_id = "a4002226-ec1d-4887-a58e-18e49b334687"

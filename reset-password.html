<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password · Safe Spot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter+Tight:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script>(function(){try{if(localStorage.getItem('safespot_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0a0a0a;--paper:#fafaf7;--muted:#6b6b66;--line:#d9d9d3;--soft:#f0f0ea;--accent:#2d7a4f;
  --serif:'Fraunces',Georgia,serif;--sans:'Inter Tight',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace}
html[data-theme="dark"]{--ink:#e8e8e4;--paper:#0f0f0d;--muted:#888884;--line:#2a2a27;--soft:#1a1a17}
html,body{min-height:100%;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.6}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:400px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:34px 30px}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
h1{font-family:var(--serif);font-weight:300;font-size:1.9rem;line-height:1.2;margin-bottom:10px;color:var(--ink)}
.sub{font-size:.9rem;color:var(--muted);line-height:1.6;margin-bottom:24px}
label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;margin-top:16px}
input[type=password]{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:5px;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;outline:none}
input[type=password]:focus{border-color:var(--ink)}
.btn{width:100%;margin-top:24px;padding:14px;background:var(--ink);color:var(--paper);border:none;border-radius:5px;font-size:.95rem;font-family:var(--sans);letter-spacing:.02em;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.86}.btn:disabled{opacity:.4;cursor:default}
.msg{margin-top:18px;font-size:.88rem;line-height:1.6;padding:12px 14px;border-radius:5px;display:none}
.msg.show{display:block}
.msg.err{background:#fbeaea;color:#8c2f2f;border:1px solid #e7c2c2}
.msg.ok{background:#e9f4ee;color:#1f6b41;border:1px solid #bfe0cd}
html[data-theme="dark"] .msg.err{background:#241414;color:#e2a3a3;border-color:#3a2020}
html[data-theme="dark"] .msg.ok{background:#13211a;color:#9fd8b6;border-color:#214030}
.foot{margin-top:22px;text-align:center}
.foot a{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:2px}
.foot a:hover{color:var(--ink)}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:7px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script src="slsc-sync.js"></script>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="eyebrow">Safe Spot</div>
    <h1>Choose a new password</h1>
    <p class="sub" id="subtext">Enter a new password for your account.</p>

    <form id="resetForm" onsubmit="return false">
      <label for="pw">New password</label>
      <input type="password" id="pw" autocomplete="new-password" placeholder="At least 8 characters">
      <label for="pw2">Confirm new password</label>
      <input type="password" id="pw2" autocomplete="new-password" placeholder="Re-enter your new password">
      <button class="btn" id="submitBtn" onclick="doReset()">Reset password</button>
    </form>

    <div class="msg" id="msg"></div>
    <div class="foot"><a href="login.html">&larr; Back to sign in</a></div>
  </div>
</div>

<script>
function getToken(){ var m = location.search.match(/[?&]token=([^&]+)/); return m ? decodeURIComponent(m[1]) : ''; }
function apiBase(){ try { return (window.SLSC_SYNC && window.SLSC_SYNC.base && window.SLSC_SYNC.base()) || ''; } catch(e){ return ''; } }
function show(kind, text){ var m = document.getElementById('msg'); m.className = 'msg show ' + kind; m.innerHTML = text; }
function disableForm(){ document.getElementById('resetForm').style.display = 'none'; }

(function init(){
  var token = getToken();
  if (!token){
    disableForm();
    show('err', 'This reset link is missing or invalid. Please request a new one from the sign-in page.');
    return;
  }
  if (!apiBase()){
    // Offline / soft-launch: the backend that verifies reset tokens isn't live yet.
    disableForm();
    show('err', 'Password reset isn&rsquo;t available yet because the site&rsquo;s online service isn&rsquo;t live. Please email <strong>enquiries@safespot.life</strong> and we&rsquo;ll help you reset.');
  }
})();

function doReset(){
  var token = getToken();
  var pw = document.getElementById('pw').value || '';
  var pw2 = document.getElementById('pw2').value || '';
  var btn = document.getElementById('submitBtn');
  if (pw.length < 8){ show('err', 'Your new password needs to be at least 8 characters.'); return; }
  if (pw !== pw2){ show('err', 'Those passwords don&rsquo;t match. Please re-enter them.'); return; }
  var base = apiBase();
  if (!base){ show('err', 'The online service isn&rsquo;t available, so the reset can&rsquo;t be completed here.'); return; }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Resetting…';
  fetch(base + '/api/auth/reset', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ token: token, password: pw })
  }).then(function(r){ return r.json().then(function(j){ return {ok:r.ok, j:j}; }); })
    .then(function(res){
      if (res.ok && res.j && res.j.ok){
        disableForm();
        show('ok', 'Your password has been reset. You can now <a href="login.html" style="color:inherit;text-decoration:underline">sign in</a> with your new password.');
      } else {
        btn.disabled = false; btn.textContent = 'Reset password';
        show('err', (res.j && res.j.error) || 'Something went wrong. Please request a new reset link.');
      }
    })
    .catch(function(){ btn.disabled = false; btn.textContent = 'Reset password'; show('err', 'Couldn&rsquo;t reach the server. Please try again in a moment.'); });
}
document.addEventListener('keydown', function(e){ if(e.key==='Enter') doReset(); });
</script>
</body>
</html>
